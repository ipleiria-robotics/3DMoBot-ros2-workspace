collision_monitor:
  ros__parameters:
    use_sim_time: False
    base_frame_id: "camera_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel" # "cmd_vel_raw" # output of nav2_bringup
    cmd_vel_out_topic: "cmd_vel_smoothed" 
    # cmd_vel_out_topic: "/focbox_unity_driver/differential_controller/cmd_vel" # when nav2focbox is not in use
    transform_tolerance: 1.0 # time in seconds? Default: 0.5
    source_timeout: 1.0
    base_shift_correction: True
    stop_pub_timeout: 1.0 #2.0
    # Polygons represent zone around the robot for "stop" and "slowdown" action types,
    # and robot footprint for "approach" action type.
    # Footprint could be "polygon" type with dynamically set footprint from footprint_topic
    # or "circle" type with static footprint set by radius. "footprint_topic" parameter
    # to be ignored in circular case.
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "polygon"
      # points: [0.45, 0.3, 0.45, -0.3, -0.4, -0.3, -0.4, 0.3] # [x1, y1, x2, y2, x3, y3, x4, y4] # camera_link
      points: [0.3, 0.45, -0.3, 0.45, -0.3, -0.4, 0.3, -0.4] # [x1, y1, x2, y2, x3, y3, x4, y4] # camera_link
      action_type: "stop"
      max_points: 1
      visualize: True
      polygon_pub_topic: "polygon_stop"
      enabled: True
    # PolygonSlow:
    #   type: "polygon"
    #   points: [0.4, 0.4, 0.4, -0.4, -0.4, -0.4, -0.4, 0.4]
    #   action_type: "slowdown"
    #   max_points: 3
    #   slowdown_ratio: 0.3
    #   visualize: True
    #   polygon_pub_topic: "polygon_slowdown"
    #   enabled: False
    # FootprintApproach:
    #   type: "polygon"
    #   action_type: "approach"
    #   footprint_topic: "/local_costmap/published_footprint"
    #   time_before_collision: 2.0
    #   simulation_time_step: 0.1
    #   max_points: 5
    #   visualize: False
    #   enabled: False
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scanner/scan"
      enabled: True
    pointcloud:
      type: "pointcloud"
      topic: "/ouster/points" #"/intel_realsense_r200_depth/points"
      min_height: 0.03
      max_height: 0.6
      enabled: True
