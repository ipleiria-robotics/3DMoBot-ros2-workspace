docking_server:
  ros__parameters:
    controller_frequency: 10.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "map"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5

    # Types of docks
    dock_plugins: ['nova_carter_dock']
    nova_carter_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 1.0 # 30 CM
      staging_x_offset: 0.0
      use_external_detection_pose: true
      detector_service_name: '/detector/toggle' # must be provided
      use_battery_status: false
      use_stall_detection: false
      rotate_to_dock: true

      external_detection_timeout: 5.0
      external_detection_translation_x: 0.3
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: 0.0 #-1.57
      external_detection_rotation_pitch: 1.57 #0.0
      external_detection_rotation_yaw: 0.0 #-1.57
      filter_coef: 0.1
      dock_direction: "forward" # "backward"

    # Sep. file of dock instances so config file can be used in multiple locations
    # dock_database: /my/path/to/dock_database.yaml

    # Dock instances
    docks: ['dock_home','dock_print_zone','dock_delivery']
    dock_home:
      type: '' #'nova_carter_dock' # "Note that you may leave the type to an empty string if there is only one type of dock being used."
      frame: map
      pose: [ 1.917, -0.748, -0.430] # relative to origin of map frame [x, y, theta (rad?)]
      id: 24
      # # Use ros2 topic echo /tf --once
      # # Convert rotation quaternion to radians 
    dock_print_zone:
      type: '' #'nova_carter_dock'
      frame: map
      # pose: [-0.685, 2.916, -3.108]
      pose: [-1.266, 1.051, -2.372]
      id: 25
    dock_delivery:
      type: '' #'nova_carter_dock'
      frame: map
      pose: [3.394, 3.443, 1.892]
      id: 26

    controller:
      k_phi: 3.0
      k_delta: 2.0
      v_linear_min: 0.1
      v_linear_max: 0.15
      transform_tolerance: 0.5
      slowdown_radius: 0.25
      rotate_to_heading_angular_vel: 1.0
      rotate_to_heading_max_angular_accel: 3.2
      use_collision_detection: false
      costmap_topic: "local_costmap/costmap_raw"
      footprint_topic: "local_costmap/published_footprint"
      transform_tolerance: 2.0 #0.1
      projection_time: 1.0
      simulation_time_step: 0.1
      dock_collision_threshold: 0.3
